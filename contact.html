<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yuvodaya Higher Secondary School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-contact yp-site">
    <div id="header-placeholder"></div>
    <div id="authpanel-placeholder"></div>

    <section class="yp-page-hero yp-page-hero-contact">
        <div class="container">
            <span class="yp-eyebrow"><i class="bi bi-envelope-heart"></i> Get in Touch</span>
            <h1>Contact Us</h1>
            <p>Admissions, school visits, and general queries.</p>
        </div>
    </section>

    <section class="yp-section">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="yp-contact-form-panel">
                        <h3>Send a Message</h3>
                        <form id="contactForm" class="mt-3">
                            <div class="row g-3">
                                <div class="col-md-6"><input type="text" class="form-control yp-input" placeholder="Full name" required></div>
                                <div class="col-md-6"><input type="email" class="form-control yp-input" placeholder="Email address" required></div>
                                <div class="col-md-6"><input type="tel" class="form-control yp-input" placeholder="Phone number" required></div>
                                <div class="col-md-6"><input type="text" class="form-control yp-input" placeholder="Topic" required></div>
                                <div class="col-12"><textarea class="form-control yp-input" rows="4" placeholder="Your message" required></textarea></div>
                            </div>
                            <button type="submit" class="btn yp-btn-primary mt-3">Submit Message</button>
                        </form>
                    </div>
                </div>
                <div class="col-lg-5">
                    <aside class="yp-contact-info-panel">
                        <h3>Quick Contact</h3>
                        <ul class="yp-contact-list">
                            <li><i class="bi bi-geo-alt-fill"></i><span>Baidyarajpur, Jajpur, Odisha</span></li>
                            <li><i class="bi bi-envelope-fill"></i><a href="mailto:yuvodayaschoolbalangir@gmail.com">yuvodayaschoolbalangir@gmail.com</a></li>
                            <li><i class="bi bi-telephone-fill"></i><a href="tel:+919437960478">+91 9437960478</a></li>
                            <li><i class="bi bi-clock-fill"></i><span>Mon–Sat: 9:00 AM – 4:00 PM</span></li>
                        </ul>
                    </aside>
                </div>
            </div>
            <div class="yp-map-panel mt-4">
                <h4><i class="bi bi-pin-map-fill"></i> Find Us on Map</h4>
                <div class="yp-map-wrap mt-3">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3728.7863155914456!2d86.3120077739068!3d20.840333580762195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a1be33e2dbfd9f1%3A0x36307e2ab9ae82d0!2sCRANIUM%20PUBLIC%20SCHOOL!5e0!3m2!1sen!2sin!4v1779350246957!5m2!1sen!2sin" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="School location map"></iframe>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <button id="backToTop" class="btn yp-back-top back-to-top" type="button"><i class="bi bi-arrow-up"></i></button>
    <a href="https://wa.me/919437960478" class="whatsapp-float yp-whatsapp" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp"><i class="bi bi-whatsapp"></i></a>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/load-components.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
