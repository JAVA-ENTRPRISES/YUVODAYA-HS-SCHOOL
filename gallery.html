<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Yuvodaya Higher Secondary School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="page-gallery yp-site">
    <div id="header-placeholder"></div>
    <div id="authpanel-placeholder"></div>

    <section class="yp-page-hero yp-page-hero-gallery">
        <div class="container">
            <span class="yp-eyebrow"><i class="bi bi-camera-fill"></i> Memories</span>
            <h1>Photo Gallery</h1>
            <p>Campus moments from Yuvodaya Higher Secondary School.</p>
        </div>
    </section>

    <section class="yp-section">
        <div class="container">
            <div class="yp-gallery-masonry">
                <figure class="yp-gallery-item yp-gallery-tall">
                    <img src="assets/images/BUILDING.jpeg" alt="Campus Building">
                    <figcaption>Campus View</figcaption>
                </figure>
                <figure class="yp-gallery-item">
                    <img src="assets/images/CLASSROOM.jpg" alt="Classroom">
                    <figcaption>Learning Space</figcaption>
                </figure>
                <figure class="yp-gallery-item">
                    <img src="assets/images/LABORATORY.jpg" alt="Lab">
                    <figcaption>Science Lab</figcaption>
                </figure>
                <figure class="yp-gallery-item yp-gallery-wide">
                    <img src="assets/images/SPORTS DAY.jpg" alt="Sports">
                    <figcaption>Sports Day</figcaption>
                </figure>
                <figure class="yp-gallery-item">
                    <img src="assets/images/ANNUAL FUNCTION.jpg" alt="Annual Function">
                    <figcaption>Annual Function</figcaption>
                </figure>
                <figure class="yp-gallery-item">
                    <img src="assets/images/LIBRARY.jpg" alt="Library">
                    <figcaption>Library</figcaption>
                </figure>
                <figure class="yp-gallery-item">
                    <img src="assets/images/Science Exhibition.jpg" alt="Science Exhibition">
                    <figcaption>Science Exhibition</figcaption>
                </figure>
                <figure class="yp-gallery-item yp-gallery-wide">
                    <img src="assets/images/CULTURAL EVENT.jpg" alt="Cultural Event">
                    <figcaption>Cultural Programme</figcaption>
                </figure>
                <figure class="yp-gallery-item">
                    <img src="assets/images/CONVOCATION.jpg" alt="Convocation">
                    <figcaption>Convocation</figcaption>
                </figure>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <button id="backToTop" class="btn yp-back-top back-to-top" type="button"><i class="bi bi-arrow-up"></i></button>

    <script src="js/load-components.js"></script>
    <script src="js/script.js"></script>
